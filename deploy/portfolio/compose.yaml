services:
  portfolio:
    image: nginx:1.30-alpine
    container_name: mochi-portfolio
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - ./site:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - proxy

networks:
  proxy:
    external: true
    name: mochi-proxy
