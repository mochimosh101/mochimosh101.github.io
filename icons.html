<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Moonlight Item List</title>
  <style>
    :root {
      --bg: #0b0f14;
      --panel: #111923;
      --panel-2: #15202d;
      --line: #243448;
      --line-strong: #36506b;
      --text: #eef5ff;
      --muted: #9eb0c3;
      --accent: #25c2f2;
      --accent-2: #7ef0c1;
      --danger: #ff9b9b;
      --shadow: 0 18px 45px rgba(0, 0, 0, .38);
    }

    * { box-sizing: border-box; }
    html { color-scheme: dark; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
      background:
        linear-gradient(rgba(6, 10, 14, .82), rgba(6, 10, 14, .92)),
        url("imgs/Icon.png") center / cover fixed;
    }

    button, input, select { font: inherit; }
    button, a { -webkit-tap-highlight-color: transparent; }

    .page {
      width: min(1480px, 100%);
      margin: 0 auto;
      padding: 18px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 14px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand img {
      width: 44px;
      height: 44px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, .12);
      box-shadow: var(--shadow);
      object-fit: cover;
      flex: 0 0 auto;
    }

    h1 {
      margin: 0;
      font-size: 26px;
      line-height: 1.05;
      letter-spacing: 0;
    }

    .sub {
      color: var(--muted);
      font-size: 13px;
      margin-top: 4px;
    }

    .home {
      color: var(--text);
      text-decoration: none;
      border: 1px solid var(--line);
      background: rgba(17, 25, 35, .82);
      padding: 10px 12px;
      border-radius: 8px;
      font-weight: 800;
      white-space: nowrap;
    }

    .layout {
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr);
      gap: 14px;
      align-items: start;
    }

    .sidebar, .content {
      background: rgba(17, 25, 35, .88);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .sidebar {
      position: sticky;
      top: 14px;
      padding: 14px;
    }

    .content {
      min-width: 0;
      overflow: hidden;
    }

    .field {
      display: grid;
      gap: 7px;
      margin-bottom: 12px;
    }

    label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .searchbox {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }

    input, select {
      width: 100%;
      min-height: 42px;
      color: var(--text);
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 11px;
      outline: none;
    }

    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37, 194, 242, .16);
    }

    .btn {
      min-height: 42px;
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--text);
      border-radius: 8px;
      padding: 9px 11px;
      font-weight: 800;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      text-decoration: none;
    }

    .btn:hover, .chip:hover { border-color: var(--line-strong); }
    .btn.primary {
      color: #061018;
      background: linear-gradient(180deg, #7ef0c1, #25c2f2);
      border-color: transparent;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      border: 1px solid var(--line);
      background: #101925;
      color: var(--text);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
    }

    .chip.active {
      border-color: rgba(126, 240, 193, .8);
      background: rgba(126, 240, 193, .14);
      color: #bffff0;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
    }

    .stat {
      background: #0e151e;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
    }

    .stat b {
      display: block;
      font-size: 20px;
      line-height: 1;
    }

    .stat span {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .quick {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
    }

    .quick-title {
      margin: 0 0 9px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .table-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 13px 14px;
      border-bottom: 1px solid var(--line);
      background: rgba(11, 16, 22, .72);
    }

    .result-copy {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 12px;
      padding: 14px;
    }

    .card {
      min-width: 0;
      background: #111a25;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    .thumb {
      height: 142px;
      background:
        linear-gradient(45deg, rgba(255,255,255,.035) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(255,255,255,.035) 25%, transparent 25%),
        #0b1119;
      background-size: 18px 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 1px solid var(--line);
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 12px;
    }

    .meta {
      padding: 11px;
      min-width: 0;
    }

    .name {
      font-weight: 900;
      line-height: 1.22;
      min-height: 38px;
      overflow-wrap: anywhere;
    }

    .facts {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      margin-top: 9px;
    }

    .pill {
      color: #c9d8e8;
      background: #0d141d;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 5px 8px;
      font-size: 12px;
      font-weight: 800;
    }

    .pill.type { color: #bffff0; border-color: rgba(126, 240, 193, .3); }
    .pill.unnamed { color: var(--danger); border-color: rgba(255, 155, 155, .32); }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 7px;
      padding: 11px;
      border-top: 1px solid var(--line);
    }

    .actions .btn {
      min-height: 38px;
      padding: 8px;
      font-size: 13px;
    }

    .pager {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 13px 14px;
      border-top: 1px solid var(--line);
      background: rgba(11, 16, 22, .72);
    }

    .pages {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .pages input {
      width: 76px;
      text-align: center;
    }

    .loading, .empty, .error {
      padding: 24px 14px;
      text-align: center;
      color: var(--muted);
      font-weight: 800;
    }

    .error { color: var(--danger); }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      z-index: 50;
      transform: translateX(-50%) translateY(18px);
      opacity: 0;
      pointer-events: none;
      transition: .18s ease;
      color: var(--text);
      background: rgba(10, 15, 21, .94);
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      padding: 10px 13px;
      box-shadow: var(--shadow);
      font-weight: 800;
      max-width: calc(100vw - 24px);
      overflow-wrap: anywhere;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 980px) {
      .page { padding: 12px; }
      .layout { grid-template-columns: 1fr; }
      .sidebar { position: static; }
      .controls-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      .field { margin-bottom: 0; }
      .quick { margin-top: 12px; padding-top: 12px; }
    }

    @media (max-width: 680px) {
      .topbar { align-items: flex-start; }
      h1 { font-size: 21px; }
      .home { padding: 10px; }
      .controls-grid { grid-template-columns: 1fr; }
      .table-head { align-items: flex-start; flex-direction: column; }
      .toolbar { width: 100%; justify-content: stretch; }
      .toolbar .btn, .toolbar select { flex: 1 1 145px; }
      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 9px;
        padding: 10px;
      }
      .thumb { height: 118px; }
      .name { min-height: 54px; font-size: 14px; }
      .actions { grid-template-columns: 1fr; }
      .pager { flex-direction: column; align-items: stretch; }
      .pages { justify-content: space-between; }
      .result-copy { font-size: 12px; }
    }

    @media (max-width: 390px) {
      .grid { grid-template-columns: 1fr; }
      .thumb { height: 136px; }
      .name { min-height: auto; }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="topbar">
      <div class="brand">
        <img src="imgs/mochi-mark.svg" alt="Sichi logo" onerror="this.src='imgs/Icon.png'">
        <div>
          <h1>Moonlight Item List</h1>
          <div class="sub">Use after /itemlist to find item IDs, pictures, and quick commands.</div>
        </div>
      </div>
      <a class="home" href="/" aria-label="Home">Home</a>
    </div>

    <div class="layout">
      <aside class="sidebar">
        <div class="controls-grid">
          <div class="field">
            <label for="q">Search</label>
            <div class="searchbox">
              <input id="q" type="search" autocomplete="off" placeholder="ID, item name, gun, scope...">
              <button class="btn" id="clear" title="Clear search">X</button>
            </div>
          </div>

          <div class="field">
            <label for="typeFilter">Type</label>
            <select id="typeFilter"></select>
          </div>

          <div class="field">
            <label for="sortBy">Sort</label>
            <select id="sortBy">
              <option value="id">ID low to high</option>
              <option value="idDesc">ID high to low</option>
              <option value="name">Name A to Z</option>
              <option value="type">Type</option>
            </select>
          </div>

          <div class="field">
            <label for="pageSize">Cards per page</label>
            <select id="pageSize">
              <option value="48">48</option>
              <option value="72" selected>72</option>
              <option value="120">120</option>
              <option value="240">240</option>
            </select>
          </div>
        </div>

        <div class="quick">
          <p class="quick-title">Fast filters</p>
          <div class="chips" id="quickFilters"></div>
        </div>

        <div class="stats">
          <div class="stat"><b id="totalCount">0</b><span>Total pictures</span></div>
          <div class="stat"><b id="shownCount">0</b><span>Matching now</span></div>
        </div>
      </aside>

      <section class="content">
        <div class="table-head">
          <div>
            <strong id="heading">Loading items...</strong>
            <div class="result-copy" id="rangeText">Checking local icon list</div>
          </div>
          <div class="toolbar">
            <button class="btn" id="copyPage">Copy page IDs</button>
            <button class="btn primary" id="copyResults">Copy all filtered IDs</button>
          </div>
        </div>

        <div id="status" class="loading">Loading item pictures...</div>
        <div id="results" class="grid" hidden></div>

        <div class="pager" id="pager" hidden>
          <button class="btn" id="prevPage">Prev</button>
          <div class="pages">
            <span class="result-copy">Page</span>
            <input id="pageInput" type="number" min="1" value="1">
            <span class="result-copy">of <span id="pageCount">1</span></span>
          </div>
          <button class="btn" id="nextPage">Next</button>
        </div>
      </section>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    const CATEGORY_LABELS = {
      all: "All types",
      attachments: "Attachments",
      magazines: "Magazines / Ammo",
      guns: "Guns",
      shirts: "Shirts / Tops",
      pants: "Pants",
      vests: "Vests / Armor",
      backpacks: "Backpacks",
      hats: "Hats / Masks",
      medical: "Medical",
      food: "Food",
      drinks: "Drinks",
      tools: "Tools",
      melee: "Melee",
      throwables: "Throwables",
      vehicles: "Vehicles",
      building: "Building",
      barricades: "Barricades",
      materials: "Materials",
      keys: "Keys / Cases",
      other: "Other"
    };

    const QUICK = ["attachments", "guns", "magazines", "shirts", "pants", "vests", "backpacks", "medical", "food", "building"];
    const $ = (id) => document.getElementById(id);
    const state = { items: [], filtered: [], page: 1, pageSize: 72 };

    const qEl = $("q");
    const typeEl = $("typeFilter");
    const sortEl = $("sortBy");
    const pageSizeEl = $("pageSize");
    const resultsEl = $("results");
    const statusEl = $("status");
    const pagerEl = $("pager");
    const toastEl = $("toast");

    function escapeHTML(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;"
      }[char]));
    }

    function cleanQuery(raw) {
      const value = (raw || "").trim();
      const png = value.match(/(\d+)(?:\.png)?(?:\?.*)?$/i);
      return png ? png[1] : value.toLowerCase();
    }

    function label(category) {
      return CATEGORY_LABELS[category] || category;
    }

    function showToast(message) {
      toastEl.textContent = message;
      toastEl.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toastEl.classList.remove("show"), 1500);
    }

    async function copy(text, message) {
      try {
        await navigator.clipboard.writeText(text);
        showToast(message || "Copied");
      } catch {
        const ta = document.createElement("textarea");
        ta.value = text;
        ta.style.position = "fixed";
        ta.style.opacity = "0";
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        ta.remove();
        showToast(message || "Copied");
      }
    }

    function populateFilters(counts) {
      const ordered = ["all", ...Object.keys(CATEGORY_LABELS).filter((key) => key !== "all" && counts[key])];
      typeEl.innerHTML = ordered.map((key) => {
        const suffix = key === "all" ? state.items.length : counts[key];
        return `<option value="${key}">${label(key)} (${suffix || 0})</option>`;
      }).join("");

      $("quickFilters").innerHTML = QUICK.filter((key) => counts[key]).map((key) =>
        `<button class="chip" type="button" data-type="${key}">${label(key)} (${counts[key]})</button>`
      ).join("");
    }

    function applyFilters() {
      const query = cleanQuery(qEl.value);
      const type = typeEl.value || "all";
      const sort = sortEl.value;

      state.filtered = state.items.filter((item) => {
        const matchesType = type === "all" || item.category === type;
        const haystack = `${item.id} ${item.name} ${label(item.category)}`.toLowerCase();
        const matchesQuery = !query || haystack.includes(query);
        return matchesType && matchesQuery;
      });

      state.filtered.sort((a, b) => {
        if (sort === "idDesc") return Number(b.id) - Number(a.id);
        if (sort === "name") return a.name.localeCompare(b.name) || Number(a.id) - Number(b.id);
        if (sort === "type") return label(a.category).localeCompare(label(b.category)) || Number(a.id) - Number(b.id);
        return Number(a.id) - Number(b.id);
      });

      document.querySelectorAll(".chip").forEach((chip) => {
        chip.classList.toggle("active", chip.dataset.type === type);
      });

      state.page = 1;
      render();
    }

    function render() {
      const total = state.filtered.length;
      const pages = Math.max(1, Math.ceil(total / state.pageSize));
      state.page = Math.min(Math.max(1, state.page), pages);

      const start = (state.page - 1) * state.pageSize;
      const pageItems = state.filtered.slice(start, start + state.pageSize);
      const end = start + pageItems.length;

      $("totalCount").textContent = state.items.length.toLocaleString();
      $("shownCount").textContent = total.toLocaleString();
      $("heading").textContent = total ? `${total.toLocaleString()} matching items` : "No matching items";
      $("rangeText").textContent = total ? `Showing ${start + 1}-${end} of ${total.toLocaleString()}` : "Try another search or type filter";
      $("pageInput").value = String(state.page);
      $("pageInput").max = String(pages);
      $("pageCount").textContent = String(pages);
      $("prevPage").disabled = state.page <= 1;
      $("nextPage").disabled = state.page >= pages;

      statusEl.hidden = true;
      resultsEl.hidden = false;
      pagerEl.hidden = false;

      if (!pageItems.length) {
        resultsEl.innerHTML = `<div class="empty">No pictures matched this lookup.</div>`;
        return;
      }

      resultsEl.innerHTML = pageItems.map((item) => `
        <article class="card" data-id="${escapeHTML(item.id)}" data-name="${escapeHTML(item.name)}">
          <div class="thumb">
            <img src="${escapeHTML(item.url)}" alt="${escapeHTML(item.name)}" loading="lazy">
          </div>
          <div class="meta">
            <div class="name" title="${escapeHTML(item.name)}">${escapeHTML(item.name)}</div>
            <div class="facts">
              <span class="pill">ID ${escapeHTML(item.id)}</span>
              <span class="pill type">${escapeHTML(label(item.category))}</span>
              ${item.named ? "" : `<span class="pill unnamed">No name data</span>`}
            </div>
          </div>
          <div class="actions">
            <button class="btn" data-copy="/item ${escapeHTML(item.id)}">/item</button>
            <button class="btn" data-copy="/market add ${escapeHTML(item.id)}">Market</button>
            <button class="btn" data-copy="${escapeHTML(location.origin + location.pathname.replace(/[^/]*$/, "") + item.url)}">Image</button>
          </div>
        </article>
      `).join("");
    }

    function currentPageLines() {
      const start = (state.page - 1) * state.pageSize;
      return state.filtered.slice(start, start + state.pageSize)
        .map((item) => `${item.id} - ${item.name} (${label(item.category)})`)
        .join("\n");
    }

    function allFilteredLines() {
      return state.filtered
        .map((item) => `${item.id} - ${item.name} (${label(item.category)})`)
        .join("\n");
    }

    function debounce(fn, wait) {
      let timer;
      return (...args) => {
        clearTimeout(timer);
        timer = setTimeout(() => fn(...args), wait);
      };
    }

    async function loadItems() {
      try {
        const response = await fetch(`icon-index.json?t=${Date.now()}`, { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        state.items = data.items || [];
        state.filtered = state.items.slice();
        populateFilters(data.counts || {});
        applyFilters();
      } catch (error) {
        statusEl.className = "error";
        statusEl.textContent = `Could not load icon-index.json: ${error.message}`;
      }
    }

    qEl.addEventListener("input", debounce(applyFilters, 120));
    qEl.addEventListener("paste", () => setTimeout(() => {
      qEl.value = cleanQuery(qEl.value);
      applyFilters();
    }));
    typeEl.addEventListener("change", applyFilters);
    sortEl.addEventListener("change", applyFilters);
    pageSizeEl.addEventListener("change", () => {
      state.pageSize = Number(pageSizeEl.value);
      state.page = 1;
      render();
    });
    $("clear").addEventListener("click", () => {
      qEl.value = "";
      typeEl.value = "all";
      applyFilters();
      qEl.focus();
    });
    $("quickFilters").addEventListener("click", (event) => {
      const button = event.target.closest("[data-type]");
      if (!button) return;
      typeEl.value = typeEl.value === button.dataset.type ? "all" : button.dataset.type;
      applyFilters();
    });
    resultsEl.addEventListener("click", (event) => {
      const button = event.target.closest("[data-copy]");
      if (!button) return;
      copy(button.dataset.copy, `Copied ${button.dataset.copy}`);
    });
    $("prevPage").addEventListener("click", () => {
      state.page -= 1;
      render();
      scrollTo({ top: 0, behavior: "smooth" });
    });
    $("nextPage").addEventListener("click", () => {
      state.page += 1;
      render();
      scrollTo({ top: 0, behavior: "smooth" });
    });
    $("pageInput").addEventListener("change", () => {
      state.page = Number($("pageInput").value) || 1;
      render();
      scrollTo({ top: 0, behavior: "smooth" });
    });
    $("copyPage").addEventListener("click", () => {
      const lines = currentPageLines();
      copy(lines || "No matching items", "Copied this page of IDs");
    });
    $("copyResults").addEventListener("click", () => {
      const lines = allFilteredLines();
      copy(lines || "No matching items", "Copied all filtered IDs");
    });

    loadItems();
  </script>
</body>
</html>
